spring.application.name=Proyecto
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestion_solicitudes}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=mint
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
app.security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-with-at-least-32-bytes}
app.security.jwt.issuer=${JWT_ISSUER:gestion-solicitudes}
app.security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT8H}
