spring.application.name=Proyecto-test
spring.datasource.url=jdbc:h2:mem:gestion_solicitudes;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
app.security.jwt.secret=test-jwt-secret-with-at-least-32b
app.security.jwt.issuer=gestion-solicitudes-test
app.security.jwt.access-token-ttl=PT1H
